<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>wtb · 沉浸视频</title>
    <style>
        /* ===== 全局重置 & 背景图（完美自适应） ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            /* 背景图 — 完美自适应，覆盖所有屏幕 */
            background-image: url('img/bjt.webp');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            /* 备用背景色（图片加载时显示） */
            background-color: #0b0d14;
            position: relative;
        }

        /* 半透明遮罩层 — 让背景图更柔和，同时保持可读性 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 0;
            pointer-events: none;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        /* 动态光晕层 — 在背景图上叠加流动的极光效果 */
        body::after {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle at 30% 40%, rgba(80, 140, 255, 0.10), transparent 60%),
                        radial-gradient(circle at 70% 60%, rgba(200, 100, 255, 0.08), transparent 50%);
            filter: blur(80px);
            animation: auroraMove 18s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        /* 第二层光晕，增加深度 */
        .aurora-layer {
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle at 60% 80%, rgba(0, 200, 255, 0.06), transparent 50%);
            filter: blur(100px);
            animation: auroraMove2 22s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes auroraMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(8%, 12%) scale(1.2); opacity: 1; }
        }

        @keyframes auroraMove2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(-6%, -10%) scale(1.3); opacity: 0.9; }
        }

        /* 微粒子（星星）装饰 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: 
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.2), transparent),
                radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.25), transparent),
                radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.15), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.2), transparent),
                radial-gradient(1.2px 1.2px at 15% 85%, rgba(255,255,255,0.15), transparent),
                radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.1), transparent),
                radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.2), transparent);
            background-size: 200% 200%;
            animation: twinkle 8s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ===== 播放器卡片 — 更透亮玻璃质感 ===== */
        .player-card {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            width: 100%;
            background: rgba(12, 18, 30, 0.55);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 48px;
            padding: 28px 28px 36px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        /* 卡片内部光晕 */
        .player-card::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(120, 160, 255, 0.05), transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
        }

        /* 视频容器 — 更精致圆角 */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            border-radius: 32px;
            overflow: hidden;
            background: #06080e;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05), 0 20px 50px rgba(0, 0, 0, 0.6);
            transition: box-shadow 0.3s;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background: #080b14;
            cursor: pointer;
        }

        /* ===== 控制栏 — 更精致磨砂 ===== */
        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 22px;
            padding: 14px 22px;
            background: rgba(8, 12, 22, 0.6);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            border-radius: 80px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: background 0.3s;
        }

        .controls button {
            background: transparent;
            border: none;
            color: #dce4f5;
            font-size: 22px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(2px);
            flex-shrink: 0;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.06);
            color: #ffffff;
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.1);
        }

        .controls button:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.06);
        }

        /* 进度条 */
        .progress-container {
            flex: 1;
            min-width: 100px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }

        .progress-bar:hover {
            height: 7px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8aa4ff, #5a7aff, #7a5cff);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(90, 122, 255, 0.3);
            transition: width 0.1s linear;
            position: relative;
        }

        /* 时间显示 */
        .time-display {
            color: #bcc8e8;
            font-size: 0.9rem;
            font-weight: 450;
            letter-spacing: 0.4px;
            background: rgba(0,0,0,0.2);
            padding: 4px 14px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.03);
            font-variant-numeric: tabular-nums;
        }

        /* 右侧控制 */
        .right-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .right-controls button {
            width: 42px;
            height: 42px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.02);
        }

        .right-controls button:hover {
            background: rgba(255, 255, 255, 0.10);
        }

        /* 音量滑块 */
        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease, opacity 0.25s;
            opacity: 0;
            display: flex;
            align-items: center;
        }

        .volume-slider.show {
            width: 78px;
            opacity: 1;
        }

        .volume-slider input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            outline: none;
            transition: background 0.2s;
        }

        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #c8d8ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 16px rgba(70, 130, 255, 0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .volume-slider input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #c8d8ff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .play-btn {
            font-size: 28px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .player-card {
                padding: 16px 16px 24px;
                border-radius: 32px;
            }
            .controls {
                padding: 10px 14px;
                gap: 8px;
                border-radius: 40px;
                flex-wrap: nowrap;
            }
            .controls button {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
            .time-display {
                font-size: 0.75rem;
                padding: 2px 10px;
            }
            .right-controls button {
                width: 36px;
                height: 36px;
                font-size: 17px;
            }
            .volume-slider.show {
                width: 54px;
            }
        }

        @media (max-width: 420px) {
            .controls {
                gap: 4px;
            }
            .progress-container {
                min-width: 50px;
            }
            .time-display {
                font-size: 0.65rem;
                padding: 2px 8px;
            }
        }

        /* 针对高度较小的屏幕，调整内边距 */
        @media (max-height: 700px) {
            .player-card {
                padding: 16px 20px 20px;
            }
            .controls {
                padding: 10px 16px;
                margin-top: 14px;
            }
            .upload-area {
                margin-top: 12px;
                padding: 4px 12px;
            }
        }

        @media (max-height: 500px) {
            .player-card {
                padding: 12px 16px 16px;
                border-radius: 28px;
            }
            .controls {
                padding: 6px 12px;
                gap: 6px;
                margin-top: 10px;
            }
            .controls button {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            .video-wrapper {
                border-radius: 20px;
            }
            .upload-area {
                margin-top: 8px;
                padding: 4px 10px;
                gap: 8px;
            }
            .upload-label {
                font-size: 0.75rem;
                padding: 4px 10px;
            }
            .file-name {
                font-size: 0.7rem;
                padding: 2px 10px;
            }
            .reset-btn {
                font-size: 0.7rem;
                padding: 2px 10px;
            }
            .time-display {
                font-size: 0.6rem;
                padding: 2px 8px;
            }
            .play-btn {
                font-size: 20px;
            }
        }

        /* ===== 占位文字 ===== */
        .video-wrapper::after {
            content: "🎬 wtb 视频演示";
            position: absolute;
            bottom: 20px;
            right: 24px;
            color: rgba(255,255,255,0.12);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.6px;
            background: rgba(0,0,0,0.2);
            padding: 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.02);
            opacity: 0.8;
            transition: opacity 0.5s;
        }

        .video-wrapper.has-source::after {
            opacity: 0;
        }

        /* ===== 上传区域 ===== */
        .upload-area {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            padding: 8px 16px;
            background: rgba(255,255,255,0.015);
            border-radius: 60px;
            border: 1px dashed rgba(255,255,255,0.06);
            backdrop-filter: blur(4px);
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.03);
        }

        .upload-label {
            color: #a0b0d4;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.02);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .upload-label:hover {
            background: rgba(255,255,255,0.06);
            color: #ffffff;
        }

        .upload-label input[type="file"] {
            display: none;
        }

        .file-name {
            color: #7a8aaa;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.15);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.03);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reset-btn {
            background: rgba(255,70,70,0.04);
            border: 1px solid rgba(255,70,70,0.08);
            color: #c09090;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .reset-btn:hover {
            background: rgba(255,70,70,0.12);
            color: #ffb0b0;
            border-color: rgba(255,70,70,0.2);
        }

        @media (max-width: 500px) {
            .upload-area {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 12px;
            }
            .file-name {
                max-width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 星星装饰 -->
    <div class="stars"></div>
    <!-- 第二层光晕 -->
    <div class="aurora-layer"></div>

    <div class="player-card">
        <div class="video-wrapper" id="videoWrapper">
            <video id="videoPlayer" preload="metadata" playsinline>
                <source src="video/ptddown.mov" type="video/quicktime">
                <source src="video/ptddown.mp4" type="video/mp4">
                您的浏览器不支持视频播放，或视频文件未找到。
            </video>
        </div>

        <!-- 控制栏 -->
        <div class="controls" id="controlsBar">
            <button class="play-btn" id="playPauseBtn" aria-label="播放或暂停">▶</button>

            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
            </div>

            <div class="right-controls">
                <button id="volumeBtn" aria-label="音量">🔊</button>
                <div class="volume-slider" id="volumeSlider">
                    <input type="range" id="volumeRange" min="0" max="1" step="0.01" value="1">
                </div>
                <button id="fullscreenBtn" aria-label="全屏">⛶</button>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-area">
            <label class="upload-label" for="fileInput">
                📁 选择视频 (MOV/MP4/AVI...)
                <input type="file" id="fileInput" accept="video/*,.mov,.qt,.mp4,.avi,.mkv">
            </label>
            <span class="file-name" id="fileName">video/ptddown.mov</span>
            <button class="reset-btn" id="resetBtn">↺ 重置</button>
        </div>
    </div>

    <script>
        (function() {
            const video = document.getElementById('videoPlayer');
            const playPauseBtn = document.getElementById('playPauseBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const timeDisplay = document.getElementById('timeDisplay');
            const volumeBtn = document.getElementById('volumeBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeRange = document.getElementById('volumeRange');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const videoWrapper = document.getElementById('videoWrapper');
            const fileInput = document.getElementById('fileInput');
            const fileName = document.getElementById('fileName');
            const resetBtn = document.getElementById('resetBtn');

            videoWrapper.classList.add('has-source');

            // ---------- 辅助 ----------
            function formatTime(seconds) {
                if (isNaN(seconds) || seconds < 0) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }

            function updateProgressAndTime() {
                if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                    const percent = (video.currentTime / video.duration) * 100;
                    progressFill.style.width = `${percent}%`;
                    timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                } else {
                    timeDisplay.textContent = '0:00 / 0:00';
                }
            }

            // ---------- 播放 ----------
            function togglePlay() {
                if (video.paused) {
                    video.play().catch(e => {});
                } else {
                    video.pause();
                }
            }

            function updatePlayButton() {
                playPauseBtn.textContent = video.paused ? '▶' : '⏸';
            }

            video.addEventListener('click', togglePlay);
            playPauseBtn.addEventListener('click', togglePlay);
            video.addEventListener('play', updatePlayButton);
            video.addEventListener('pause', updatePlayButton);

            // ---------- 进度 ----------
            video.addEventListener('timeupdate', updateProgressAndTime);
            video.addEventListener('loadedmetadata', updateProgressAndTime);

            progressBar.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                    video.currentTime = x * video.duration;
                }
            });

            let isDragging = false;
            progressBar.addEventListener('mousedown', function(e) {
                isDragging = true;
                const rect = this.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                    video.currentTime = x * video.duration;
                }
            });
            window.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                const rect = progressBar.getBoundingClientRect();
                let x = (e.clientX - rect.left) / rect.width;
                x = Math.min(1, Math.max(0, x));
                if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                    video.currentTime = x * video.duration;
                    progressFill.style.width = `${x * 100}%`;
                    timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                }
            });
            window.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    updateProgressAndTime();
                }
            });

            // 触摸
            progressBar.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                const rect = this.getBoundingClientRect();
                const x = (touch.clientX - rect.left) / rect.width;
                if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                    video.currentTime = x * video.duration;
                }
            }, { passive: true });
            progressBar.addEventListener('touchmove', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = this.getBoundingClientRect();
                let x = (touch.clientX - rect.left) / rect.width;
                x = Math.min(1, Math.max(0, x));
                if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                    video.currentTime = x * video.duration;
                    progressFill.style.width = `${x * 100}%`;
                    timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                }
            }, { passive: false });

            // ---------- 音量 ----------
            let volumeVisible = false;
            volumeBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                volumeVisible = !volumeVisible;
                volumeSlider.classList.toggle('show', volumeVisible);
                if (!volumeVisible) volumeRange.blur();
            });

            volumeRange.addEventListener('input', function() {
                const val = parseFloat(this.value);
                video.volume = val;
                if (val === 0) volumeBtn.textContent = '🔇';
                else if (val < 0.5) volumeBtn.textContent = '🔉';
                else volumeBtn.textContent = '🔊';
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.right-controls') && !e.target.closest('.controls')) {
                    if (volumeVisible) {
                        volumeVisible = false;
                        volumeSlider.classList.remove('show');
                    }
                }
            });

            video.volume = 1;
            volumeRange.value = 1;
            volumeBtn.textContent = '🔊';

            // ---------- 全屏 ----------
            fullscreenBtn.addEventListener('click', function() {
                if (!document.fullscreenElement) {
                    const container = document.querySelector('.player-card');
                    if (container.requestFullscreen) {
                        container.requestFullscreen().catch(err => {
                            if (video.requestFullscreen) video.requestFullscreen();
                        });
                    } else if (video.requestFullscreen) {
                        video.requestFullscreen();
                    } else if (video.webkitRequestFullscreen) {
                        video.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            });

            document.addEventListener('fullscreenchange', updateFullscreenIcon);
            document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

            function updateFullscreenIcon() {
                fullscreenBtn.textContent = '⛶';
            }

            // ---------- 上传 ----------
            fileInput.addEventListener('change', function(e) {
                const file = this.files[0];
                if (!file) return;
                fileName.textContent = file.name.length > 25 ? file.name.substr(0, 22) + '…' : file.name;
                const fileURL = URL.createObjectURL(file);
                video.pause();
                video.src = fileURL;
                video.load();
                video.play().catch(() => {});
                videoWrapper.classList.add('has-source');
                progressFill.style.width = '0%';
                timeDisplay.textContent = '0:00 / 0:00';
                video.addEventListener('loadedmetadata', function onLoaded() {
                    updateProgressAndTime();
                    video.removeEventListener('loadedmetadata', onLoaded);
                });
            });

            // ---------- 重置 ----------
            resetBtn.addEventListener('click', function() {
                if (video.src && video.src.startsWith('blob:')) {
                    URL.revokeObjectURL(video.src);
                }
                video.src = 'video/ptddown.mov';
                video.load();
                video.play().catch(() => {});
                fileName.textContent = 'video/ptddown.mov';
                fileInput.value = '';
                videoWrapper.classList.add('has-source');
                video.addEventListener('loadedmetadata', function onLoaded() {
                    updateProgressAndTime();
                    video.removeEventListener('loadedmetadata', onLoaded);
                });
                updateProgressAndTime();
            });

            // ---------- 事件 ----------
            video.addEventListener('loadeddata', function() {
                updateProgressAndTime();
                videoWrapper.classList.add('has-source');
            });

            video.addEventListener('error', function() {
                videoWrapper.classList.add('has-source');
                timeDisplay.textContent = '⚠️ 视频未找到';
                if (video.src && video.src.includes('.mov')) {
                    video.src = 'video/ptddown.mp4';
                    video.load();
                }
            });

            // 键盘
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.key === 'f' || e.key === 'F') {
                    fullscreenBtn.click();
                }
            });

            // 初始化
            updateProgressAndTime();
            updatePlayButton();
            videoWrapper.classList.add('has-source');

            volumeSlider.addEventListener('click', function(e) {
                e.stopPropagation();
            });

            // 拖拽
            document.addEventListener('dragover', function(e) {
                e.preventDefault();
            });
            document.addEventListener('drop', function(e) {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    if (file.type.startsWith('video/') || file.name.match(/\.(mov|qt|mp4|avi|mkv|webm)$/i)) {
                        fileInput.files = files;
                        fileInput.dispatchEvent(new Event('change'));
                    } else {
                        alert('请拖拽视频文件 (支持 MOV, MP4, AVI 等)');
                    }
                }
            });
        })();
    </script>
</body>
</html>
