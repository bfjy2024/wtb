<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>wtb · 视频演示</title>
    <style>
        /* 全局重置 & 优雅渐变背景 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            /* 深邃星空渐变 — 好看且沉浸 */
            background: radial-gradient(ellipse at 30% 20%, #1a1e2e, #0b0d14 70%, #050608);
            background-attachment: fixed;
        }

        /* 卡片式播放器 — 柔光玻璃质感，带微光边框 */
        .player-card {
            max-width: 1000px;
            width: 100%;
            background: rgba(16, 20, 30, 0.65);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 44px;
            padding: 24px 24px 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 视频容器 — 圆角 & 精致阴影 */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            border-radius: 30px;
            overflow: hidden;
            background: #080a10;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), 0 16px 40px rgba(0, 0, 0, 0.7);
            transition: box-shadow 0.3s;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background: #0a0c14;
            cursor: pointer;
        }

        /* 自定义控制栏 — 悬浮在底部，半透明磨砂 */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 12px 18px;
            background: rgba(10, 14, 22, 0.7);
            backdrop-filter: blur(10px) saturate(160%);
            -webkit-backdrop-filter: blur(10px) saturate(160%);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            transition: background 0.2s;
        }

        .controls button {
            background: transparent;
            border: none;
            color: #e8edf8;
            font-size: 22px;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(2px);
            flex-shrink: 0;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: scale(1.04);
            color: #ffffff;
        }

        .controls button:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.08);
        }

        /* 进度条容器 */
        .progress-container {
            flex: 1;
            min-width: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.15s;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
        }

        .progress-bar:hover {
            height: 7px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a8b8ff, #6d8cff, #5a7aff);
            border-radius: 10px;
            box-shadow: 0 0 16px rgba(90, 122, 255, 0.4);
            transition: width 0.1s linear;
            position: relative;
        }

        /* 时间显示 */
        .time-display {
            color: #c8d2e8;
            font-size: 0.9rem;
            font-weight: 450;
            letter-spacing: 0.3px;
            background: rgba(0,0,0,0.25);
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.04);
            font-variant-numeric: tabular-nums;
        }

        /* 右侧控制组 (音量 + 全屏) */
        .right-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .right-controls button {
            width: 40px;
            height: 40px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.03);
        }

        .right-controls button:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* 音量滑块 (迷你) */
        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width 0.25s ease, opacity 0.2s;
            opacity: 0;
            display: flex;
            align-items: center;
        }

        .volume-slider.show {
            width: 72px;
            opacity: 1;
        }

        .volume-slider input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            outline: none;
            transition: background 0.2s;
        }

        .volume-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #d0dcff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 12px rgba(70, 130, 255, 0.5);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .volume-slider input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #d0dcff;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* 播放/暂停 图标微调 */
        .play-btn {
            font-size: 26px;
        }

        /* 响应式调整 */
        @media (max-width: 600px) {
            .player-card {
                padding: 16px 16px 24px;
                border-radius: 32px;
            }
            .controls {
                padding: 10px 14px;
                gap: 8px;
                border-radius: 40px;
                flex-wrap: nowrap;
            }
            .controls button {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
            .time-display {
                font-size: 0.75rem;
                padding: 2px 10px;
            }
            .right-controls button {
                width: 36px;
                height: 36px;
                font-size: 17px;
            }
            .volume-slider.show {
                width: 54px;
            }
        }

        @media (max-width: 420px) {
            .controls {
                gap: 4px;
            }
            .progress-container {
                min-width: 60px;
            }
            .time-display {
                font-size: 0.7rem;
                padding: 2px 6px;
            }
        }

        /* 加载/提示文字（优雅占位） */
        .video-wrapper::after {
            content: "🎬 wtb 视频演示";
            position: absolute;
            bottom: 20px;
            right: 24px;
            color: rgba(255,255,255,0.15);
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.6px;
            background: rgba(0,0,0,0.25);
            padding: 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.03);
            opacity: 0.8;
            transition: opacity 0.5s;
        }

        .video-wrapper.has-source::after {
            opacity: 0;
        }

        /* 文件上传区域 — 融入背景 */
        .upload-area {
            margin-top: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            padding: 6px 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 60px;
            border: 1px dashed rgba(255,255,255,0.08);
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.04);
        }

        .upload-label {
            color: #aab8d8;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.3px;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 40px;
            background: rgba(255,255,255,0.03);
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .upload-label:hover {
            background: rgba(255,255,255,0.08);
            color: #ffffff;
        }

        .upload-label input[type="file"] {
            display: none;
        }

        .file-name {
            color: #8899bb;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.2);
            padding: 4px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.04);
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reset-btn {
            background: rgba(255,70,70,0.06);
            border: 1px solid rgba(255,70,70,0.12);
            color: #d0a0a0;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(4px);
        }

        .reset-btn:hover {
            background: rgba(255,70,70,0.15);
            color: #ffc0c0;
            border-color: rgba(255,70,70,0.25);
        }

        @media (max-width: 500px) {
            .upload-area {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 12px;
            }
            .file-name {
                max-width: 100%;
                text-align: center;
            }
        }

        /* 小点缀：光晕 */
        .player-card::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(80, 120, 255, 0.06), transparent 70%);
            pointer-events: none;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
        }
        .player-card {
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="video-wrapper" id="videoWrapper">
        <!-- video 元素：默认加载 wtb 目录下的第一个视频 -->
        <!-- 注意：将 'wtb/你的视频文件名.mov' 替换为实际文件名 -->
        <!-- 由于我们无法动态列出目录，这里使用一个约定：如果存在 wtb/video.mov 则加载，否则使用回退 -->
        <!-- 你可以将视频命名为 video.mov 或修改下面的 src -->
        <video id="videoPlayer" preload="metadata" playsinline>
            <!-- 默认加载 wtb 目录下的第一个视频 (请将 'video.mov' 替换为实际文件名) -->
            <source src="wtb/video.mov" type="video/quicktime">
            <!-- 备选：如果是mp4 -->
            <source src="wtb/video.mp4" type="video/mp4">
            <!-- 如果以上都不存在，显示提示 -->
            您的浏览器不支持视频播放，或视频文件未找到。
        </video>
    </div>

    <!-- 自定义控制栏 -->
    <div class="controls" id="controlsBar">
        <button class="play-btn" id="playPauseBtn" aria-label="播放或暂停">▶</button>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
        </div>

        <div class="right-controls">
            <button id="volumeBtn" aria-label="音量">🔊</button>
            <div class="volume-slider" id="volumeSlider">
                <input type="range" id="volumeRange" min="0" max="1" step="0.01" value="1">
            </div>
            <button id="fullscreenBtn" aria-label="全屏">⛶</button>
        </div>
    </div>

    <!-- 上传区域 (方便测试其他视频) -->
    <div class="upload-area">
        <label class="upload-label" for="fileInput">
            📁 选择视频 (MOV/MP4/AVI...)
            <input type="file" id="fileInput" accept="video/*,.mov,.qt,.mp4,.avi,.mkv">
        </label>
        <span class="file-name" id="fileName">wtb/video.mov</span>
        <button class="reset-btn" id="resetBtn">↺ 重置</button>
    </div>
</div>

<script>
    (function() {
        const video = document.getElementById('videoPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeRange = document.getElementById('volumeRange');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoWrapper = document.getElementById('videoWrapper');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const resetBtn = document.getElementById('resetBtn');

        // 标记已有视频源
        videoWrapper.classList.add('has-source');

        // ---------- 辅助函数 ----------
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgressAndTime() {
            if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                const percent = (video.currentTime / video.duration) * 100;
                progressFill.style.width = `${percent}%`;
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            } else {
                timeDisplay.textContent = '0:00 / 0:00';
            }
        }

        // ---------- 播放/暂停 ----------
        function togglePlay() {
            if (video.paused) {
                video.play().catch(e => { /* 自动播放策略忽略 */ });
            } else {
                video.pause();
            }
        }

        function updatePlayButton() {
            if (video.paused) {
                playPauseBtn.textContent = '▶';
            } else {
                playPauseBtn.textContent = '⏸';
            }
        }

        video.addEventListener('click', togglePlay);
        playPauseBtn.addEventListener('click', togglePlay);

        video.addEventListener('play', updatePlayButton);
        video.addEventListener('pause', updatePlayButton);

        // ---------- 进度条 ----------
        video.addEventListener('timeupdate', updateProgressAndTime);
        video.addEventListener('loadedmetadata', updateProgressAndTime);

        progressBar.addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                video.currentTime = x * video.duration;
            }
        });

        let isDragging = false;
        progressBar.addEventListener('mousedown', function(e) {
            isDragging = true;
            const rect = this.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                video.currentTime = x * video.duration;
            }
        });
        window.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            const rect = progressBar.getBoundingClientRect();
            let x = (e.clientX - rect.left) / rect.width;
            x = Math.min(1, Math.max(0, x));
            if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                video.currentTime = x * video.duration;
                progressFill.style.width = `${x * 100}%`;
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        });
        window.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                updateProgressAndTime();
            }
        });

        // 触摸
        progressBar.addEventListener('touchstart', function(e) {
            const touch = e.touches[0];
            const rect = this.getBoundingClientRect();
            const x = (touch.clientX - rect.left) / rect.width;
            if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                video.currentTime = x * video.duration;
            }
        }, { passive: true });
        progressBar.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = this.getBoundingClientRect();
            let x = (touch.clientX - rect.left) / rect.width;
            x = Math.min(1, Math.max(0, x));
            if (video.duration && !isNaN(video.duration) && isFinite(video.duration)) {
                video.currentTime = x * video.duration;
                progressFill.style.width = `${x * 100}%`;
                timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
            }
        }, { passive: false });

        // ---------- 音量 ----------
        let volumeVisible = false;
        volumeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            volumeVisible = !volumeVisible;
            volumeSlider.classList.toggle('show', volumeVisible);
            if (!volumeVisible) {
                volumeRange.blur();
            }
        });

        volumeRange.addEventListener('input', function() {
            const val = parseFloat(this.value);
            video.volume = val;
            if (val === 0) {
                volumeBtn.textContent = '🔇';
            } else if (val < 0.5) {
                volumeBtn.textContent = '🔉';
            } else {
                volumeBtn.textContent = '🔊';
            }
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.right-controls') && !e.target.closest('.controls')) {
                if (volumeVisible) {
                    volumeVisible = false;
                    volumeSlider.classList.remove('show');
                }
            }
        });

        video.volume = 1;
        volumeRange.value = 1;
        volumeBtn.textContent = '🔊';

        // ---------- 全屏 ----------
        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                const container = document.querySelector('.player-card');
                if (container.requestFullscreen) {
                    container.requestFullscreen().catch(err => {
                        if (video.requestFullscreen) video.requestFullscreen();
                    });
                } else if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        });

        document.addEventListener('fullscreenchange', updateFullscreenIcon);
        document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

        function updateFullscreenIcon() {
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                fullscreenBtn.textContent = '⛶';
            } else {
                fullscreenBtn.textContent = '⛶';
            }
        }

        // ---------- 文件上传 ----------
        fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) return;

            fileName.textContent = file.name.length > 25 ? file.name.substr(0, 22) + '…' : file.name;

            const fileURL = URL.createObjectURL(file);
            video.pause();
            video.src = fileURL;
            video.load();
            video.play().catch(() => {});
            videoWrapper.classList.add('has-source');
            progressFill.style.width = '0%';
            timeDisplay.textContent = '0:00 / 0:00';

            video.addEventListener('loadedmetadata', function onLoaded() {
                updateProgressAndTime();
                video.removeEventListener('loadedmetadata', onLoaded);
            });
        });

        // ---------- 重置：恢复默认 wtb/video.mov ----------
        resetBtn.addEventListener('click', function() {
            if (video.src && video.src.startsWith('blob:')) {
                URL.revokeObjectURL(video.src);
            }
            // 重置为 wtb 目录下的视频 (请确保文件存在)
            video.src = 'wtb/ptddown.mov';
            // 如果浏览器不支持mov，尝试mp4
            // 这里我们同时保留两个source，但video.src会覆盖，所以重新设置
            video.load();
            video.play().catch(() => {});
            fileName.textContent = 'wtb/ptddown.mov';
            fileInput.value = '';
            videoWrapper.classList.add('has-source');
            // 等待加载完成更新
            video.addEventListener('loadedmetadata', function onLoaded() {
                updateProgressAndTime();
                video.removeEventListener('loadedmetadata', onLoaded);
            });
            updateProgressAndTime();
        });

        // ---------- 视频加载事件 ----------
        video.addEventListener('loadeddata', function() {
            updateProgressAndTime();
            videoWrapper.classList.add('has-source');
        });

        video.addEventListener('error', function() {
            videoWrapper.classList.add('has-source');
            timeDisplay.textContent = '⚠️ 视频未找到';
            // 尝试加载 mp4 备选
            if (video.src && video.src.includes('.mov')) {
                // 如果mov加载失败，尝试mp4
                video.src = 'wtb/ptddown.mp4';
                video.load();
            }
        });

        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.key === 'f' || e.key === 'F') {
                fullscreenBtn.click();
            }
        });

        // 初始化
        updateProgressAndTime();
        updatePlayButton();
        videoWrapper.classList.add('has-source');

        volumeSlider.addEventListener('click', function(e) {
            e.stopPropagation();
        });

        // 拖拽支持
        document.addEventListener('dragover', function(e) {
            e.preventDefault();
        });
        document.addEventListener('drop', function(e) {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('video/') || file.name.match(/\.(mov|qt|mp4|avi|mkv|webm)$/i)) {
                    fileInput.files = files;
                    fileInput.dispatchEvent(new Event('change'));
                } else {
                    alert('请拖拽视频文件 (支持 MOV, MP4, AVI 等)');
                }
            }
        });
    })();
</script>
</body>
</html>
